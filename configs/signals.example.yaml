# ============================================================================
# EXAMPLE FILE — REPLACE THE intersection_id VALUES BEFORE USING.
#
# IDs in this file (42, 7, 8, 100, 101) are placeholders and will not
# match any real OSM extract. trafficsim will log a warning and skip any
# override whose intersection_id is out of range or targets an
# unsignalled intersection.
#
# To find real intersection IDs for your OSM file, look in the graph
# build log or load the file in the viewer and click on intersections
# (the HUD shows the selected ID).
#
# Schema validation rejects: negative durations, both green_dur and
# yellow_dur being zero on the same phase (would not progress), unknown
# mode strings, unknown ban categories.
# ============================================================================

signals:
  # Example 1: custom phase plan, normal cycling mode.
  - intersection_id: 42                # <- REPLACE with a real intersection_id
    phases:
      - green_edges: [0, 2]
        green_dur: 45
        yellow_dur: 3
      - green_edges: [1, 3]
        green_dur: 20
        yellow_dur: 3

  # Example 2: start an intersection in flash mode. When phases are
  # omitted, the auto-generated default plan is used (groups approaches
  # by heading axis), and `mode:` decides which axis blinks yellow.
  #
  # Valid mode values:
  #   normal   - fixed-time cycle (default)
  #   flash_a  - phase 0 approaches blink yellow (priority);
  #              other approaches blink red (must yield)
  #   flash_b  - phase 1 approaches blink yellow (priority);
  #              other approaches blink red (must yield)
  #   off      - all approaches dark; treated as a 4-way stop
  #
  # Modes can also be toggled at runtime in the live viewer:
  # click a signal, then press N (normal), Y (this axis yellow),
  # R (other axis yellow), O (off).
  - intersection_id: 7                 # <- REPLACE
    mode: flash_a

  - intersection_id: 8                 # <- REPLACE
    mode: off

# Turn restrictions. Each entry forbids a category of turn at one
# intersection. The sim classifies turns by the angle between the
# arrival and departure headings:
#   straight_on : |angle| < 15°
#   left_turn   : angle in (15°, 165°]
#   right_turn  : angle in [-165°, -15°)
#   u_turn      : |angle| > 165°
#
# Michigan-style "no left turn" intersections: ban left_turn (and
# usually u_turn) at the cross-street intersection. The router will
# automatically find a Michigan-left path through any nearby U-turn
# pockets that exist in the OSM data.
turn_restrictions:
  - intersection_id: 100               # <- REPLACE
    ban: [left_turn, u_turn]

  - intersection_id: 101               # <- REPLACE
    ban: [u_turn]
